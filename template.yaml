AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  AskLore — S3 data source ingested by a Bedrock Knowledge Base
  (OpenSearch Serverless VECTORSEARCH storage), RetrievalLambda calling
  Bedrock Retrieve + Gemini for grounded generation, and API Gateway.

# ── Deploy workflow ─────────────────────────────────────────────────────────────
#
#   1. Create an S3 bucket for CloudFormation artifacts (one-time):
#        aws s3 mb s3://asklore-cfn-artifacts-<your-account>
#
#   2. Package (upload Lambda code, rewrite template):
#        aws cloudformation package \
#          --template-file template.yaml \
#          --s3-bucket asklore-cfn-artifacts-<your-account> \
#          --output-template-file template-packaged.yaml
#
#   3. Deploy:
#        aws cloudformation deploy \
#          --template-file template-packaged.yaml \
#          --stack-name asklore-stack \
#          --capabilities CAPABILITY_NAMED_IAM \
#          --parameter-overrides file://config/<env>.json AossAdminPrincipalArn=<your-iam-user-or-role-arn>
#
#      Environment-specific values (Bedrock model IDs, log retention, API
#      throttling) live in config/<env>.json, one file per STACK_NAME suffix
#      (asklore-dev -> config/dev.json). scripts/build-and-deploy.sh picks
#      this up automatically; falls back to this template's Defaults if the
#      file doesn't exist.
#
#   4. View outputs (bucket names, collection endpoint, API URL):
#        aws cloudformation describe-stacks \
#          --stack-name asklore-stack \
#          --query "Stacks[0].Outputs" --output table
#
# ────────────────────────────────────────────────────────────────────────────────

Parameters:
  AossAdminPrincipalArn:
    Type: String
    Description: >-
      IAM user/role ARN granted direct AOSS data-plane access to the asklore
      index, for manual debugging via the OpenSearch dashboard. Pass your own
      IAM ARN at deploy time, e.g.:
        aws cloudformation deploy ... --parameter-overrides AossAdminPrincipalArn=arn:aws:iam::<account>:user/<you>

  EmbeddingModelId:
    Type: String
    Default: cohere.embed-english-v3
    Description: Bedrock embedding model ID used by the Knowledge Base

  GeminiModelId:
    Type: String
    Default: gemini-2.5-flash
    Description: Gemini model ID used for RAG generation

  LogRetentionDays:
    Type: Number
    Default: 30
    Description: CloudWatch Logs retention (days) for all Lambda log groups

  ApiThrottlingRateLimit:
    Type: Number
    Default: 50
    Description: API Gateway steady-state rate limit (requests/sec) for the v1 stage

  ApiThrottlingBurstLimit:
    Type: Number
    Default: 100
    Description: API Gateway burst limit (concurrent requests) for the v1 stage

Resources:

  # ── IAM Roles ──────────────────────────────────────────────────────────────

  KnowledgeBaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-kb-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KnowledgeBasePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${EmbeddingModelId}"
              - Effect: Allow
                Action:
                  - aoss:APIAccessAll
                Resource:
                  - !Sub "arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${AWS::StackName}-raw-${AWS::AccountId}-${AWS::Region}"
                  - !Sub "arn:aws:s3:::${AWS::StackName}-raw-${AWS::AccountId}-${AWS::Region}/*"

  AossKbIndexLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-aoss-kb-index-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AossKbIndexPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - aoss:APIAccessAll
                Resource:
                  - !Sub "arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/*"

  IngestionTriggerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ingestion-trigger-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IngestionTriggerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:StartIngestionJob
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/${AskLoreKnowledgeBase}"

  RetrievalLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-retrieval-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RetrievalPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/${AskLoreKnowledgeBase}"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref GeminiApiKeySecret

  DedupLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-dedup-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DedupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${AWS::StackName}-raw-uploads-${AWS::AccountId}-${AWS::Region}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${AWS::StackName}-raw-${AWS::AccountId}-${AWS::Region}/*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource:
                  - !GetAtt FileHashesTable.Arn

  # ── DynamoDB Tables ─────────────────────────────────────────────────────────

  FileHashesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-file-hashes"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: file_hash
          AttributeType: S
      KeySchema:
        - AttributeName: file_hash
          KeyType: HASH

  # ── Secrets Manager ─────────────────────────────────────────────────────────
  # No initial value: populate the real key post-deploy, out of band, e.g.
  #   aws secretsmanager put-secret-value --secret-id <GeminiApiKeySecretArn output> --secret-string '<key>'
  # Never via a CloudFormation parameter or config/<env>.json.

  GeminiApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/gemini-api-key"
      Description: "Gemini API key for RetrievalLambda generation calls"

  # ── OpenSearch Serverless ───────────────────────────────────────────────────
  # Encryption and network policies must exist before the collection is created.

  AossEncryptionPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${AWS::StackName}-encryption"
      Type: encryption
      Policy: !Sub >-
        {"Rules":[{"ResourceType":"collection","Resource":["collection/${AWS::StackName}"]}],"AWSOwnedKey":true}

  AossNetworkPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${AWS::StackName}-network"
      Type: network
      # AllowFromPublic is acceptable for MVP; restrict to a VPC endpoint in Phase 6.
      Policy: !Sub >-
        [{"Rules":[{"ResourceType":"collection","Resource":["collection/${AWS::StackName}"]},{"ResourceType":"dashboard","Resource":["collection/${AWS::StackName}"]}],"AllowFromPublic":true}]

  AossCollection:
    Type: AWS::OpenSearchServerless::Collection
    DependsOn:
      - AossEncryptionPolicy
      - AossNetworkPolicy
    Properties:
      Name: !Ref AWS::StackName
      Type: VECTORSEARCH

  # Grants Lambda/Bedrock roles index read/write access at the data layer.
  # The Principal ARNs are resolved via !Sub at deploy time.
  # RetrievalLambdaRole is deliberately NOT a principal here: RetrievalLambda calls
  # bedrock-agent-runtime:Retrieve, never OpenSearch directly. Adding it would
  # also create a circular dependency (this policy -> RetrievalLambdaRole -> the KB ARN in
  # its IAM policy -> AskLoreKnowledgeBase -> AossKbIndex -> this policy).
  AossAccessPolicy:
    Type: AWS::OpenSearchServerless::AccessPolicy
    DependsOn:
      - AossCollection
    Properties:
      Name: !Sub "${AWS::StackName}-access"
      Type: data
      Policy: !Sub >-
        [{"Rules":[{"ResourceType":"index","Resource":["index/${AWS::StackName}/*"],"Permission":["aoss:CreateIndex","aoss:DeleteIndex","aoss:UpdateIndex","aoss:DescribeIndex","aoss:ReadDocument","aoss:WriteDocument"]},{"ResourceType":"collection","Resource":["collection/${AWS::StackName}"],"Permission":["aoss:CreateCollectionItems","aoss:DescribeCollectionItems"]}],"Principal":["${KnowledgeBaseRole.Arn}","${AossKbIndexLambdaRole.Arn}","${AossAdminPrincipalArn}"]}]

  # ── Lambda Functions ────────────────────────────────────────────────────────
  # Code paths are local directories; `aws cloudformation package` ZIPs and
  # uploads each one to S3 before deployment.

  AossKbIndexFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-kb-index-setup"
      Description: "CloudFormation custom resource: creates the AOSS vector index the Knowledge Base reads from"
      Runtime: python3.12
      Handler: handler.handler
      Code: build/kb-index-setup
      Role: !GetAtt AossKbIndexLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          OPENSEARCH_ENDPOINT: !GetAtt AossCollection.CollectionEndpoint
          INDEX_NAME: !Sub "${AWS::StackName}-kb-index"

  AossKbIndexFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AossKbIndexFunction}"
      RetentionInDays: !Ref LogRetentionDays

  # Must wait on AossKbIndexFunctionLogGroup too, not just AossAccessPolicy:
  # invoking the Lambda here before CloudFormation creates its explicit log
  # group lets Lambda auto-create an untracked one on first execution, which
  # then collides with AossKbIndexFunctionLogGroup's own CREATE.
  AossKbIndex:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - AossAccessPolicy
      - AossKbIndexFunctionLogGroup
    Properties:
      ServiceToken: !GetAtt AossKbIndexFunction.Arn

  DedupLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-dedup"
      Description: "Hashes uploaded objects, dedups against DynamoDB, copies new content into asklore-raw under its domain prefix"
      Runtime: python3.12
      Handler: handler.handler
      Code: build/dedup
      Role: !GetAtt DedupLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          FILE_HASHES_TABLE: !Ref FileHashesTable
          CLEAN_BUCKET: !Sub "${AWS::StackName}-raw-${AWS::AccountId}-${AWS::Region}"

  DedupLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DedupLambda}"
      RetentionInDays: !Ref LogRetentionDays

  IngestionTriggerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ingestion-trigger"
      Description: "Triggers a Bedrock Knowledge Base ingestion job when a new document lands in asklore-raw"
      Runtime: python3.12
      Handler: handler.handler
      Code: build/ingestion-trigger
      Role: !GetAtt IngestionTriggerLambdaRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          KNOWLEDGE_BASE_ID: !GetAtt AskLoreKnowledgeBase.KnowledgeBaseId
          DATA_SOURCE_ID: !GetAtt AskLoreDataSource.DataSourceId

  IngestionTriggerLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${IngestionTriggerLambda}"
      RetentionInDays: !Ref LogRetentionDays

  RetrievalLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-retrieval"
      Description: "Bedrock Retrieve against the Knowledge Base, Gemini generates the grounded answer"
      Runtime: python3.12
      Handler: handler.handler
      Code: build/retrieval
      Role: !GetAtt RetrievalLambdaRole.Arn
      Timeout: 28
      MemorySize: 256
      Environment:
        Variables:
          KNOWLEDGE_BASE_ID: !GetAtt AskLoreKnowledgeBase.KnowledgeBaseId
          GEMINI_MODEL_ID: !Ref GeminiModelId
          GEMINI_API_KEY_SECRET_ARN: !Ref GeminiApiKeySecret

  RetrievalLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${RetrievalLambda}"
      RetentionInDays: !Ref LogRetentionDays

  # ── Bedrock Knowledge Base ──────────────────────────────────────────────────

  AskLoreKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    DependsOn:
      - AossKbIndex
    Properties:
      Name: !Sub "${AWS::StackName}-kb"
      RoleArn: !GetAtt KnowledgeBaseRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${EmbeddingModelId}"
      StorageConfiguration:
        Type: OPENSEARCH_SERVERLESS
        OpensearchServerlessConfiguration:
          CollectionArn: !GetAtt AossCollection.Arn
          VectorIndexName: !Sub "${AWS::StackName}-kb-index"
          FieldMapping:
            VectorField: vector
            TextField: text
            MetadataField: metadata

  AskLoreDataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      Name: !Sub "${AWS::StackName}-raw-datasource"
      KnowledgeBaseId: !Ref AskLoreKnowledgeBase
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          # String-built, not !GetAtt CleanBucket.Arn — CleanBucket depends (transitively, via
          # IngestionTriggerLambda's env vars) on this resource's DataSourceId, so a direct
          # reference back to CleanBucket would create a circular dependency.
          BucketArn: !Sub "arn:aws:s3:::${AWS::StackName}-raw-${AWS::AccountId}-${AWS::Region}"
      VectorIngestionConfiguration:
        ChunkingConfiguration:
          ChunkingStrategy: FIXED_SIZE
          FixedSizeChunkingConfiguration:
            MaxTokens: 300
            OverlapPercentage: 20

  # ── Lambda Permissions ──────────────────────────────────────────────────────
  # These must exist before the S3 buckets configure their notifications,
  # because S3 verifies it can invoke the Lambda during bucket creation.

  IngestionTriggerLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt IngestionTriggerLambda.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${AWS::StackName}-raw-${AWS::AccountId}-${AWS::Region}"

  DedupLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DedupLambda.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${AWS::StackName}-raw-uploads-${AWS::AccountId}-${AWS::Region}"

  RetrievalApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt RetrievalLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AskLoreApi}/*/POST/query"

  # ── S3 Buckets ──────────────────────────────────────────────────────────────
  # Buckets are created after Lambda Permissions so S3 can verify invocation
  # rights when registering the notification configuration.

  # Physical bucket name suffix is still "-raw" (predates the dedup pipeline) —
  # this is the KB's ingestion source, populated by DedupLambda copying deduped
  # content in from RawUploadsBucket.
  CleanBucket:
    Type: AWS::S3::Bucket
    DependsOn:
      - IngestionTriggerLambdaPermission
    Properties:
      BucketName: !Sub "${AWS::StackName}-raw-${AWS::AccountId}-${AWS::Region}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt IngestionTriggerLambda.Arn

  # No VersioningConfiguration: this is a transient landing zone — DedupLambda
  # copies or deletes every object within the same invocation, so there is
  # never a prior version worth preserving.
  RawUploadsBucket:
    Type: AWS::S3::Bucket
    DependsOn:
      - DedupLambdaPermission
    Properties:
      BucketName: !Sub "${AWS::StackName}-raw-uploads-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt DedupLambda.Arn

  EvalBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-eval-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── API Gateway ─────────────────────────────────────────────────────────────

  AskLoreApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      Description: AskLore internal knowledge query API

  QueryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AskLoreApi
      ParentId: !GetAtt AskLoreApi.RootResourceId
      PathPart: query

  QueryMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AskLoreApi
      ResourceId: !Ref QueryResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations"
          - LambdaArn: !GetAtt RetrievalLambda.Arn

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - QueryMethod
    Properties:
      RestApiId: !Ref AskLoreApi
      Description: AskLore API deployment

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref AskLoreApi
      DeploymentId: !Ref ApiDeployment
      StageName: v1
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingRateLimit: !Ref ApiThrottlingRateLimit
          ThrottlingBurstLimit: !Ref ApiThrottlingBurstLimit

# ── Outputs ─────────────────────────────────────────────────────────────────────

Outputs:
  CleanBucketName:
    Description: "Ingested by the Knowledge Base's S3 data source — populated by DedupLambda copying deduped content from the raw-uploads bucket"
    Value: !Sub "${AWS::StackName}-raw-${AWS::AccountId}-${AWS::Region}"

  RawUploadsBucketName:
    Description: "Drop new source documents here — DedupLambda copies new content into the raw bucket and deletes duplicates"
    Value: !Sub "${AWS::StackName}-raw-uploads-${AWS::AccountId}-${AWS::Region}"

  FileHashesTableName:
    Description: "DynamoDB table tracking ingested content hashes for dedup"
    Value: !Ref FileHashesTable

  EvalBucketName:
    Description: "Golden Q&A dataset (Phase 5)"
    Value: !Sub "${AWS::StackName}-eval-${AWS::AccountId}-${AWS::Region}"

  CollectionEndpoint:
    Description: "OpenSearch Serverless HTTPS endpoint"
    Value: !GetAtt AossCollection.CollectionEndpoint

  KnowledgeBaseId:
    Description: "Bedrock Knowledge Base ID"
    Value: !GetAtt AskLoreKnowledgeBase.KnowledgeBaseId

  GeminiApiKeySecretArn:
    Description: "Populate with: aws secretsmanager put-secret-value --secret-id <this ARN> --secret-string '<key>'"
    Value: !Ref GeminiApiKeySecret

  ApiUrl:
    Description: 'POST /query — body: {"query": "..."}'
    Value: !Sub "https://${AskLoreApi}.execute-api.${AWS::Region}.amazonaws.com/v1/query"
